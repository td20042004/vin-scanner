<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIN 車身號碼辨識系統 (Gemini 升級版)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --accent: #00d4ff;
      --accent2: #ff6b35;
      --success: #00e676;
      --warn: #ffb300;
      --danger: #ff3d71;
      --text: #e8f0fe;
      --muted: #6b7a99;
      --border: rgba(0, 212, 255, 0.15);
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Noto Sans TC', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0, 212, 255, 0.05) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), #0066ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .logo-text p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Config panel */
    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .config-panel summary {
      cursor: pointer;
      font-size: 13px;
      color: var(--accent);
      font-family: var(--mono);
      letter-spacing: 0.05em;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .config-panel summary::before {
      content: '⚙';
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    @media(max-width:600px) {
      .config-grid {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Upload zone */
    .upload-zone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all .3s;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(0, 212, 255, 0.04);
    }

    .upload-zone.dragover {
      transform: scale(1.01);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    .upload-zone h2 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .upload-zone p {
      font-size: 13px;
      color: var(--muted);
    }

    .upload-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #preview-container {
      display: none;
      margin-top: 16px;
      position: relative;
    }

    #preview-img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .clear-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      transition: color .2s;
    }

    .clear-btn:hover {
      color: var(--danger);
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.05em;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #0066ff);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0, 212, 255, 0.5);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #00a854);
      color: #000;
      box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-2px);
    }

    .btn-success:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading */
    .loading-bar {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      align-items: center;
      gap: 12px;
    }

    .loading-bar.show {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Result table */
    #result-section {
      display: none;
    }

    #result-section.show {
      display: block;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      display: inline-block;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: rgba(0, 212, 255, 0.06);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .vin-code {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .vin-unknown {
      color: var(--warn);
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
    }

    .badge-new {
      background: rgba(0, 230, 118, 0.15);
      color: var(--success);
      border: 1px solid rgba(0, 230, 118, 0.3);
    }

    .badge-dup {
      background: rgba(255, 179, 0, 0.15);
      color: var(--warn);
      border: 1px solid rgba(255, 179, 0, 0.3);
    }

    /* History */
    #history-section {
      display: none;
    }

    #history-section.show {
      display: block;
    }

    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      max-height: 320px;
      overflow-y: auto;
    }

    .history-card::-webkit-scrollbar {
      width: 4px;
    }

    .history-card::-webkit-scrollbar-track {
      background: transparent;
    }

    .history-card::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .history-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 13px;
      gap: 12px;
    }

    .history-row:last-child {
      border-bottom: none;
    }

    .history-num {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 11px;
      min-width: 28px;
    }

    .history-vin {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 14px;
      flex: 1;
      letter-spacing: 0.05em;
    }

    .history-meta {
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 13px;
      font-family: var(--mono);
      display: none;
      z-index: 1000;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: slideIn .3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #toast.success {
      border-color: rgba(0, 230, 118, 0.4);
      color: var(--success);
    }

    #toast.error {
      border-color: rgba(255, 61, 113, 0.4);
      color: var(--danger);
    }

    #toast.info {
      border-color: rgba(0, 212, 255, 0.4);
      color: var(--accent);
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-icon">🚗</div>
    <div class="logo-text">
      <h1>VIN_SCANNER</h1>
      <p>車身號碼 AI 辨識系統 · Gemini Pro Vision</p>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      <span>READY</span>
    </div>
  </header>

  <main>

    <details class="config-panel" id="config-details">
      <summary>系統設定 (首次使用請展開填寫)</summary>
      <div class="config-grid">
        <div>
          <label>Google Apps Script URL</label>
          <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec" />
          <p class="hint">部署 Apps Script 後取得的 URL</p>
        </div>
        <div>
          <label>Gemini API Key (免費申請)</label>
          <input type="password" id="gemini-key" placeholder="AIzaSy..." />
          <p class="hint"><a href="https://aistudio.google.com/app/apikey" target="_blank">👉 點此免費取得 Key</a> (僅安全儲存於本機)
          </p>
        </div>
      </div>
      <button onclick="verifyKey()"
        style="margin-top:16px;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:12px;">🔍
        確認設定是否已儲存</button>
    </details>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" capture="environment" />
      <span class="upload-icon">📷</span>
      <h2>上傳 VIN 照片</h2>
      <p>點擊選擇圖片，或直接拖曳至此<br>支援 JPG、PNG、HEIC · 手機可直接拍照</p>
      <div id="preview-container">
        <img id="preview-img" />
        <button class="clear-btn" id="clear-btn" onclick="clearImage(event)">✕ 清除</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="scan-btn" onclick="scanVIN()" disabled>
        🔍 AI 辨識 VIN
      </button>
      <button class="btn btn-success" id="write-btn" onclick="writeToSheets()" disabled>
        📊 寫入 Google Sheets
      </button>
    </div>

    <div class="loading-bar" id="loading">
      <div class="spinner"></div>
      <span id="loading-text">AI 辨識中，請稍候...</span>
    </div>

    <div id="result-section">
      <div class="section-title">辨識結果</div>
      <div class="result-card">
        <table>
          <thead>
            <tr>
              <th>編號</th>
              <th>品牌</th>
              <th>車種</th>
              <th>車身號碼</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="history-section">
      <div class="section-title">本地歷史記錄 <span style="color:var(--muted);font-size:10px;">(儲存於此裝置)</span></div>
      <div class="history-card" id="history-list"></div>
    </div>

  </main>

  <footer>VIN_SCANNER · 個人專用 · Gemini 1.5 Flash Vision · 資料同步至 Google Sheets</footer>

  <div id="toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────
    let currentImageBase64 = null;
    let currentMimeType = 'image/jpeg';
    let currentResult = null;
    let localHistory = [];

    // ── Init ───────────────────────────────────────────────
    window.addEventListener('load', () => {
      // 讀取儲存的 GAS URL
      const savedUrl = localStorage.getItem('vin_gas_url') || '';
      if (savedUrl) document.getElementById('gas-url').value = savedUrl;

      // 讀取儲存的 Gemini API Key
      const savedKey = localStorage.getItem('gemini_api_key') || '';
      if (savedKey) document.getElementById('gemini-key').value = savedKey;

      localHistory = JSON.parse(localStorage.getItem('vin_history') || '[]');
      renderHistory();

      // 自動儲存設定變更
      document.getElementById('gas-url').addEventListener('change', e => {
        localStorage.setItem('vin_gas_url', e.target.value.trim());
        toast('✅ Apps Script URL 已儲存', 'success');
      });

      document.getElementById('gemini-key').addEventListener('change', e => {
        localStorage.setItem('gemini_api_key', e.target.value.trim());
        toast('✅ Gemini API Key 已儲存', 'success');
      });
    });

    // ── Drag & Drop ────────────────────────────────────────
    const zone = document.getElementById('upload-zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    document.getElementById('file-input').addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) { toast('請上傳圖片檔案', 'error'); return; }
      currentMimeType = file.type || 'image/jpeg';
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        currentImageBase64 = dataUrl.split(',')[1];
        document.getElementById('preview-img').src = dataUrl;
        document.getElementById('preview-container').style.display = 'block';
        document.getElementById('scan-btn').disabled = false;
        document.getElementById('result-section').classList.remove('show');
        document.getElementById('write-btn').disabled = true;
        currentResult = null;
      };
      reader.readAsDataURL(file);
    }

    function clearImage(e) {
      e.stopPropagation();
      currentImageBase64 = null;
      document.getElementById('preview-img').src = '';
      document.getElementById('preview-container').style.display = 'none';
      document.getElementById('file-input').value = '';
      document.getElementById('scan-btn').disabled = true;
      document.getElementById('write-btn').disabled = true;
      document.getElementById('result-section').classList.remove('show');
    }

    // ── NHTSA VIN 精準解碼 ────────────────────────────────
    async function decodeVINfromNHTSA(vin) {
      try {
        const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
        const data = await res.json();
        const results = data.Results;

        const get = (var_name) => {
          const item = results.find(r => r.Variable === var_name);
          return (item && item.Value && item.Value !== 'null' && item.Value !== 'Not Applicable') ? item.Value : '';
        };

        const make = get('Make');
        const model = get('Model');
        const year = get('Model Year');
        const trim = get('Trim');
        const series = get('Series');

        let modelStr = model;
        if (series) modelStr += ' ' + series;
        if (trim) modelStr += ' ' + trim;
        if (year) modelStr = year + ' ' + modelStr;

        return {
          brand: make || '',
          model: modelStr.trim() || ''
        };
      } catch (e) {
        return { brand: '', model: '' };
      }
    }

    // ── Scan VIN via Google Gemini 1.5 Flash ────────
    async function scanVIN() {
      if (!currentImageBase64) { toast('請先上傳圖片', 'error'); return; }

      const apiKey = localStorage.getItem('gemini_api_key');
      if (!apiKey) {
        toast('❌ 請先展開系統設定，填入 Gemini API Key', 'error');
        document.getElementById('config-details').open = true;
        return;
      }

      setLoading(true, '✨ Gemini AI 深度辨識中...');

      const prompt = `你是一個專業的字元擷取(OCR)專家。請分析這張圖片（可能是汽車實體銘牌、擋風玻璃VIN、或台灣行車執照），並提取 17 碼的車身號碼 (VIN)。

【重點辨識規則】
1. 注意方向性：圖片中的文字「極有可能是垂直或旋轉 90 度」的狀態，請仔細沿著文字基準線，從頭到尾完整閱讀，不要跳字。
2. 絕對長度：VIN 絕對是 17 個字元（英文大寫 + 數字），不含 I、O、Q。
3. 容錯推測：遇到局部反光、髒污或因角度導致字體變形時，請根據殘餘輪廓與前後文「盡最大努力推測」（特別注意 1與7、8與B、J與U、5與6 的分別）。「只有」在該字元 100% 徹底毀損無法辨識時，才使用 ?。
4. 排除雜訊：針對「車身貼紙」，請忽略旁邊的 kg 重量資訊或 Typ 代碼。針對「行照」，請只抓「車身號碼」欄位，避開引擎號碼。
5. 嚴禁腦補車型：請完全依賴你看到的像素推測，不要用 Audi B7、B8 等底盤代碼來強行覆蓋圖片上的字元。`;

      try {
        const mimeType = currentMimeType || 'image/jpeg';
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: prompt },
                { inline_data: { mime_type: mimeType, data: currentImageBase64 } }
              ]
            }],
            generationConfig: {
              response_mime_type: "application/json",
              response_schema: {
                type: "OBJECT",
                properties: {
                  vin: { type: "STRING", description: "完整17碼" },
                  brand: { type: "STRING", description: "廠牌文字" },
                  model: { type: "STRING", description: "車型文字" },
                  confidence: { type: "STRING", description: "high/medium/low" },
                  note: { type: "STRING", description: "簡述辨識狀況" }
                },
                required: ["vin", "brand", "model", "confidence", "note"]
              }
            }
          })
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.error?.message || 'API 請求失敗');
        }

        const data = await response.json();
        const resultText = data.candidates[0].content.parts[0].text;
        const result = JSON.parse(resultText);

        currentResult = result;

        // 若 VIN 完整（無?），用 NHTSA 精準解碼品牌車種
        if (!result.vin.includes('?')) {
          setLoading(true, '🔎 查詢精準車種資料庫...');
          const decoded = await decodeVINfromNHTSA(result.vin);
          if (decoded.brand) currentResult.brand = decoded.brand;
          if (decoded.model) currentResult.model = decoded.model;
        }

        renderResult(currentResult);
        setLoading(false);

        if (result.vin.includes('?')) {
          toast('⚠️ 仍有模糊字元，建議重新拍攝', 'info');
        } else {
          toast('✅ Gemini 辨識完成', 'success');
        }

      } catch (err) {
        setLoading(false);
        if (err.message.includes('API_KEY_INVALID')) {
          toast('❌ API Key 錯誤，請檢查設定', 'error');
        } else {
          toast('❌ 辨識失敗：' + err.message, 'error');
        }
        console.error(err);
      }
    }

    function renderResult(result) {
      const tbody = document.getElementById('result-tbody');
      const isDup = localHistory.some(h => h.vin === result.vin && !result.vin.includes('?'));
      const statusBadge = isDup
        ? '<span class="badge badge-dup">⚠ 重複</span>'
        : '<span class="badge badge-new">✓ 新增</span>';

      const vinClass = result.vin.includes('?') ? 'vin-code vin-unknown' : 'vin-code';

      tbody.innerHTML = `<tr>
    <td>1</td>
    <td>${result.brand || '—'}</td>
    <td>${result.model || '—'}</td>
    <td><span class="${vinClass}">${result.vin}</span></td>
    <td>${statusBadge}</td>
  </tr>`;

      if (result.note) {
        tbody.innerHTML += `<tr><td colspan="5" style="color:var(--warn);font-size:12px;font-family:var(--mono)">📝 ${result.note}</td></tr>`;
      }

      document.getElementById('result-section').classList.add('show');
      if (!result.vin.includes('?')) {
        document.getElementById('write-btn').disabled = false;
      }
    }

    // ── Write to Google Sheets via Apps Script ─────────────
    async function writeToSheets() {
      const gasUrl = localStorage.getItem('vin_gas_url') || '';
      if (!gasUrl) { toast('請先設定 Google Apps Script URL', 'error'); document.getElementById('config-details').open = true; return; }
      if (!currentResult) { toast('請先執行 VIN 辨識', 'error'); return; }

      setLoading(true, '📊 寫入 Google Sheets...');

      const isDup = localHistory.some(h => h.vin === currentResult.vin);
      const today = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

      const payload = {
        action: isDup ? 'update' : 'insert',
        vin: currentResult.vin,
        brand: currentResult.brand || '',
        model: currentResult.model || '',
        date: today
      };

      try {
        await fetch(gasUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        // Save to local history
        if (!isDup) {
          localHistory.unshift({ vin: currentResult.vin, brand: currentResult.brand, model: currentResult.model, date: today, reupload: '' });
        } else {
          const idx = localHistory.findIndex(h => h.vin === currentResult.vin);
          if (idx > -1) localHistory[idx].reupload = today;
        }
        localStorage.setItem('vin_history', JSON.stringify(localHistory));
        renderHistory();

        setLoading(false);
        toast(isDup ? '⚠️ 重複 VIN，已更新再次上傳日期' : '✅ 已寫入 Google Sheets', isDup ? 'info' : 'success');
        document.getElementById('write-btn').disabled = true;

      } catch (err) {
        setLoading(false);
        toast('❌ 寫入失敗：' + err.message, 'error');
      }
    }

    // ── History ────────────────────────────────────────────
    function renderHistory() {
      const list = document.getElementById('history-list');
      if (localHistory.length === 0) {
        document.getElementById('history-section').classList.remove('show');
        return;
      }
      document.getElementById('history-section').classList.add('show');
      list.innerHTML = localHistory.map((h, i) => `
    <div class="history-row">
      <span class="history-num">${String(i + 1).padStart(2, '0')}</span>
      <div>
        <div class="history-vin">${h.vin}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${h.brand || ''} ${h.model || ''}</div>
      </div>
      <div class="history-meta">
        <div>${h.date}</div>
        ${h.reupload ? `<div style="color:var(--warn);">再次: ${h.reupload}</div>` : ''}
      </div>
    </div>
  `).join('');
    }

    // ── Utils ──────────────────────────────────────────────
    function setLoading(show, text) {
      const el = document.getElementById('loading');
      el.classList.toggle('show', show);
      if (text) document.getElementById('loading-text').textContent = text;
      document.getElementById('scan-btn').disabled = show;
    }

    function verifyKey() {
      const url = localStorage.getItem('vin_gas_url') || '';
      const key = localStorage.getItem('gemini_api_key') || '';

      if (!url || !key) {
        toast('❌ 設定未完成！請確認 GAS URL 與 Gemini API Key 都有填寫', 'error');
      } else {
        toast('✅ 設定已確認儲存完畢', 'success');
      }
    }

    let toastTimer;
    function toast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = type;
      el.style.display = 'block';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3500);
    }
  </script>

</body>
